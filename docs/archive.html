      const detailView = document.getElementById('archive-detail-view');
      const searchView = document.getElementById('archive-search-view');
      if (!detailView || !searchView) return; // markup not injected yet

      const detailInner = detailView.querySelector('.detail-page-inner');
      const tagsEl = document.getElementById('detail-tags');
      const tagsBody = tagsEl.querySelector('.detail-tags-body');
      const backBtn = detailView.querySelector('.detail-back');
      const prevBtn = document.getElementById('detail-prev');
      const nextBtn = document.getElementById('detail-next');
      function goToSlug(slug) {
        if (!slug) return;
        // Clean path URL (/modem-142); re-route in place. The shell's popstate
        // handler re-routes when the user navigates back across these entries.
        history.pushState({}, '', '/' + slug);
        withData(route);

      prevBtn.onclick = () => goToSlug(prevBtn.dataset.slug);
      nextBtn.onclick = () => goToSlug(nextBtn.dataset.slug);

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"]/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
      }

        return decodeURIComponent((location.hash || '').replace(/^#/, '')).trim();
      }
      // Clean-URL slug taken straight from the path (/modem-142 → "modem-142").
      // "archive" (the bare search route) is not a record slug.
      function slugFromPath() {
        const p = decodeURIComponent(location.pathname || '').replace(/^\/|\/$/g, '').trim();

      // ---- custom full-show player over a hidden SoundCloud widget ----
      function playerMarkup(sc) {
        if (!sc || !sc.api) return '';
        const src = 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(sc.api) +
          '&auto_play=false&buying=false&sharing=false&download=false&show_artwork=false' +
          '&show_comments=false&show_playcount=false&visual=false&hide_related=true';
        return '<div class="sc-player">' +
          '<div class="sc-time"><span class="sc-cur">0:00</span> / <span class="sc-dur">–:––</span></div>' +
          '<div class="sc-row">' +
            '<button class="sc-toggle" type="button" aria-label="play">▶</button>' +
            '<div class="sc-bar"><div class="sc-progress"></div><div class="sc-playhead"></div></div>' +
          '</div>' +
          '</div>' +
          '<iframe class="sc-hidden" allow="autoplay" src="' + src + '"></iframe>';

      function initPlayer() {
        const wrap = detailInner.querySelector('.sc-player');
        const iframe = detailInner.querySelector('.sc-hidden');
        if (!wrap || !iframe) return;
        const toggle = wrap.querySelector('.sc-toggle');
        const bar = wrap.querySelector('.sc-bar');
        const prog = wrap.querySelector('.sc-progress');
        const playhead = wrap.querySelector('.sc-playhead');
        const curEl = wrap.querySelector('.sc-cur');
        const durEl = wrap.querySelector('.sc-dur');
        const fmt = (ms) => { const s = Math.max(0, Math.floor(ms / 1000)); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); };
        const seek = (frac) => { const p = Math.max(0, Math.min(1, frac)) * 100; prog.style.width = p + '%'; playhead.style.left = p + '%'; };
        let widget = null, durationMs = 0;
        function ready() {
          widget = SC.Widget(iframe);
          widget.bind(SC.Widget.Events.READY, () => widget.getDuration((d) => { durationMs = d; durEl.textContent = fmt(d); }));
          widget.bind(SC.Widget.Events.PLAY, () => { toggle.textContent = '❚❚'; });
          widget.bind(SC.Widget.Events.PAUSE, () => { toggle.textContent = '▶'; });
          widget.bind(SC.Widget.Events.FINISH, () => { toggle.textContent = '▶'; seek(0); curEl.textContent = '0:00'; });
          widget.bind(SC.Widget.Events.PLAY_PROGRESS, (e) => { seek(e.relativePosition); curEl.textContent = fmt(e.currentPosition); });
        }
        toggle.onclick = () => { if (widget) widget.toggle(); };
        bar.onclick = (e) => { if (!widget || !durationMs) return; const r = bar.getBoundingClientRect(); const frac = (e.clientX - r.left) / r.width; seek(frac); widget.seekTo(frac * durationMs); };
        (function wait(n) { if (window.SC && SC.Widget) ready(); else if (n > 0) setTimeout(() => wait(n - 1), 100); })(60);
      }

      // Turn SoundCloud's big square "visual" player into the classic horizontal
      // one so it matches the compact Bandcamp widgets (uniform 120px, set in CSS).
      // Bandcamp embeds are left as-authored — including the thin "small" bars,
      // which stay 42px. The hidden full-show widget (.sc-hidden) is outside
      // .modem-body, so it's never touched here.
      function normalizeEmbeds(root) {
        root.querySelectorAll('iframe').forEach((f) => {
          const src = f.getAttribute('src') || '';
          if (!/w\.soundcloud\.com\/player/i.test(src)) return;
          let s = /visual=true/i.test(src)
            ? src.replace(/visual=true/i, 'visual=false')
            : (/visual=false/i.test(src) ? src : src + (src.indexOf('?') > -1 ? '&' : '?') + 'visual=false');
          s = s.replace(/show_comments=true/i, 'show_comments=false')
               .replace(/show_teaser=true/i, 'show_teaser=false');
          // CRITICAL: hide_related=true stops SoundCloud from auto-playing an
          // unrelated "recommended" track when the embed finishes.
          s = /hide_related=/i.test(s) ? s.replace(/hide_related=(true|false)/i, 'hide_related=true')
            : s + (s.indexOf('?') > -1 ? '&' : '?') + 'hide_related=true';
          f.setAttribute('src', s);
          f.setAttribute('height', '120'); f.setAttribute('width', '100%');
        });
        // Strip SoundCloud's baked-in "artist · title" caption — a bare <div>
        // whose only links point to soundcloud.com — that sits under each embed.
        root.querySelectorAll('div').forEach((div) => {
          if (div.querySelector('iframe, p, div')) return;
          const links = div.querySelectorAll('a');
          if (links.length && Array.prototype.every.call(links, (a) => /soundcloud\.com/i.test(a.getAttribute('href') || ''))) div.remove();

      }

      // The 2020–2023 shows repeat every SoundCloud embed's "artist · title" as a
      // hyperlink caption in the <p> right beneath the player (radiostudent's own
      // markup). Once the player renders, that caption is pure redundancy — drop it.
      // BUT only when the track is LIVE: a dead track's embed is a blank grey box,
      // and then the caption is the sole surviving record of what was there (~26% of
      // show embeds are dead source-side), so those stay. Liveness = the track id is
      // present in data.tracks (build-track-index drops embeds whose oEmbed 404s).
      function stripRedundantScCaptions(body) {
        const tracks = (window.__modemData && window.__modemData.tracks) || [];
        const liveScIds = new Set(
          tracks.filter((t) => t.kind === 'soundcloud' && t.key)
                .map((t) => String(t.key).replace(/^sc:/, ''))
        );
        // A caption <p>: no embed, ≥1 link, EVERY link points to soundcloud.com, and
        // the only text outside the links is separators (·, -, /, whitespace).
        const isScCaption = (el) => {
          if (!el || el.tagName !== 'P' || el.querySelector('iframe')) return false;
          const links = el.querySelectorAll('a');
          if (!links.length) return false;
          if (!Array.prototype.every.call(links, (a) => /soundcloud\.com/i.test(a.getAttribute('href') || ''))) return false;
          const clone = el.cloneNode(true);
          clone.querySelectorAll('a').forEach((a) => a.remove());
          return (clone.textContent || '').replace(/[\s·|/\\,.–—-]+/g, '') === '';
        };
        body.querySelectorAll('iframe').forEach((f) => {
          const id = ((f.getAttribute('src') || '').match(/tracks\/(\d+)/) || [])[1];
          if (!id || !liveScIds.has(id)) return;         // not a live SC track → keep any caption
          const p = f.closest('p') || f.parentElement;
          const cap = p && p.nextElementSibling;
          if (isScCaption(cap)) cap.remove();
        });
      }

      // The Drupal "video" field's YouTube clips are appended after the whole music
      // tracklist, so they read as a trailing "video" section. Set it apart from the
      // music embeds with a little breathing room + a subtle hairline. Boundary = the
      // first YouTube embed with no music (SoundCloud/Bandcamp) embed after it.
      function separateVideoSection(body) {
        const embeds = Array.prototype.slice.call(body.querySelectorAll('iframe'));
        if (!embeds.length) return;
        const isYT = (f) => /youtube\.com|youtu\.be/i.test(f.getAttribute('src') || '');
        const isMusic = (f) => /soundcloud\.com\/player|bandcamp\.com/i.test(f.getAttribute('src') || '');
        let lastMusic = -1;
        embeds.forEach((f, i) => { if (isMusic(f)) lastMusic = i; });
        if (lastMusic < 0) return;                       // no music embeds → nothing to divide
        const firstVid = embeds.find((f, i) => i > lastMusic && isYT(f));
        if (!firstVid) return;                           // no trailing video section
        const p = firstVid.closest('p') || firstVid.parentElement;
        if (!p || !p.parentNode) return;
        const hr = document.createElement('div');
        hr.className = 'modem-video-divider';
        p.parentNode.insertBefore(hr, p);
      }

      // previous/next show (or list) by number, within the same type
      function neighbors(rec, records) {
        const same = (records || []).filter((r) => r.type === rec.type);
        same.sort((a, b) => (a.number || 0) - (b.number || 0) || String(a.slug).localeCompare(String(b.slug)));
        const i = same.findIndex((r) => r.slug === rec.slug);
        return { prev: i > 0 ? same[i - 1] : null, next: i > -1 && i < same.length - 1 ? same[i + 1] : null };
      }
      function setNav(btn, target) {
        if (target) { btn.hidden = false; btn.dataset.slug = target.slug; btn.title = target.title || target.slug; }
        else { btn.hidden = true; btn.removeAttribute('data-slug'); }
      }

      // Year-end lists have no "/////" headings — each entry is a description
      // paragraph ("Artist - Title (Label)") followed by its embed. Pull the artist
      // (first link) + label (the trailing "(…)" link) out of it and append the same
      // clickable search chips alongside the entry.
      function injectListTags(body) {
        const chip = (kind, cls, n) => '<span class="chip ' + cls + ' clickable" data-kind="' + kind + '" data-name="' + esc(n) + '">' + esc(n) + '</span>';
        const artists = new Set(), labels = new Set();
        [...body.querySelectorAll('p')].forEach((p) => {
          if (p.querySelector('iframe')) return;              // skip embed paragraphs
          const next = p.nextElementSibling;
          if (!next || !next.querySelector('iframe')) return; // only descriptions (immediately followed by an embed)
          const txt = (p.textContent || '').trim();
          if (!txt) return;
          // format is "ARTIST - TITLE (LABEL)": artist is before the first " - ";
          // the trailing "(...)" is the label (linked OR plain text) — unless it says
          // "self-released". "v.a."/"various artists" isn't a real artist, so skip it.
          const firstLink = p.querySelector('a');
          // artist = a leading artist link (some names run straight into "- title"
          // with no space before the dash), otherwise the text before the first " - "
          let artist;
          if (firstLink && txt.startsWith(firstLink.textContent.trim())) artist = firstLink.textContent.trim();
          else { const dash = txt.search(/\s[-–—]\s/); artist = dash > 0 ? txt.slice(0, dash).trim() : ''; }
          const pm = txt.match(/\(([^()]*)\)\s*$/);
          let label = pm ? pm[1].trim() : '';
          if (/^self[\s-]?released$/i.test(label)) label = '';
          let chips = '';
          if (artist && !/^(v\.?\s?a\.?|various\s+artists?)$/i.test(artist)) { chips += chip('artist', 'artist-chip', artist); artists.add(artist); }
          if (label && label.toLowerCase() !== artist.toLowerCase()) { chips += chip('label', 'label-chip', label); labels.add(label); }
          if (!chips) return;
          // description on the left, chips pushed to the right edge (like the shows, minus the slashes)
          p.classList.add('list-row');
          p.innerHTML = '<span class="list-desc">' + p.innerHTML + '</span><span class="list-tags">' + chips + '</span>';
        });
        // Stray embeds: some entries pack a 2nd (or 3rd) album under one description
        // with no line of its own. Give each its own entry, using the resolved
        // track's artist (from its embed) so it gets a heading + chip like the rest.
        const tracks = (window.__modemData && window.__modemData.tracks) || [];
        const byId = {};
        tracks.forEach((t) => { const m = (t.embedSrc || '').match(/(?:album|track)=(\d+)/); if (m && !byId[m[1]]) byId[m[1]] = t; });
        [...body.querySelectorAll('p')].forEach((p) => {
          if (!p.querySelector('iframe')) return;
          const prev = p.previousElementSibling;
          if (!(prev && prev.querySelector('iframe'))) return; // it already has a description (prev isn't an embed)
          const src = p.querySelector('iframe').getAttribute('src') || '';
          const m = src.match(/(?:album|track)=(\d+)/);
          const t = m ? byId[m[1]] : null;
          if (!t || !t.artist) return;
          const row = document.createElement('p');
          row.className = 'list-row';
          const desc = esc(t.artist) + ((t.album || t.title) ? ' - ' + esc(t.album || t.title) : '');
          row.innerHTML = '<span class="list-desc">' + desc + '</span><span class="list-tags">' + chip('artist', 'artist-chip', t.artist) + '</span>';
          p.parentNode.insertBefore(row, p);
          artists.add(t.artist);
        });
        return { artists: [...artists], labels: [...labels] };
      }

      // Under each tracklist heading (the "name /////" seg-marker), drop the same
      // artist/label chips that live in the bottom-right bubble — but only the ones
      // for THAT track's segment — so each entry shows (and links) its own tags.
      function injectSegTags(body, rec) {
        const tracks = (window.__modemData && window.__modemData.tracks) || [];
        const arts = {}, labs = {}; // seg → Set of names
        const add = (m, seg, n) => { if (seg != null && n) (m[seg] = m[seg] || new Set()).add(n); };
        (rec.artists || []).forEach((a) => add(arts, a.seg, a.name));
        // Seed label chips from the record's own taxonomy too, so a segment whose
        // embed died on the source's end (common in the 2015–2017 shows → the track
        // is dropped from the index) still shows its label chip.
        (rec.labels || []).forEach((l) => add(labs, l.seg, l.name));
        // Artists + labels come from the (possibly admin-edited) per-track data:
        // the artist of every track in each segment (surfacing compilation artists),
        // and its label list — so tag edits show here immediately. For un-edited
        // releases these equal the record's segment tags.
        // Segments that already name an artist via the record's own taxonomy (the heading).
        const artistHeadingSegs = new Set((rec.artists || []).filter((a) => a.seg != null && a.name).map((a) => String(a.seg)));
        tracks.forEach((t) => (t.shows || []).forEach((s) => {
          if (s.slug !== rec.slug) return;
          // Surface a track's own artist as a chip ONLY when the segment has no artist
          // heading of its own — i.e. compilation / label / untagged segments (this is
          // what shows the various artists on a VA release). For an artist-headed
          // segment, trust the heading, so a foreign track mis-grouped under it can't
          // inject a wrong artist chip (e.g. a "BCAA system" clip trailing OAKMILK's
          // section in modem-157).
          if (!artistHeadingSegs.has(String(s.seg))) add(arts, s.seg, t.artist);
          (s.labels || []).forEach((l) => add(labs, s.seg, l));
        }));
        const chip = (kind, cls, n) => '<span class="chip ' + cls + ' clickable" data-kind="' + kind + '" data-name="' + esc(n) + '">' + esc(n) + '</span>';
        const slashes = '<span class="seg-slashes" aria-hidden="true">' + '/'.repeat(200) + '</span>';
        body.querySelectorAll('.seg-marker[data-seg]').forEach((p) => {
          const seg = p.getAttribute('data-seg');
          const a = arts[seg] ? [...arts[seg]] : [], l = labs[seg] ? [...labs[seg]] : [];
          const chips = a.map((n) => chip('artist', 'artist-chip', n)).join('') + l.map((n) => chip('label', 'label-chip', n)).join('');
          const tagsHtml = chips ? '<span class="seg-tags">' + chips + '</span>' : '';
          // Some (esp. earlier) shows tuck relevant hyperlinks INTO the slash line —
          // NEVER destroy those. Keep the name+linked-slashes intact on the left and
          // pin the same chips to the right edge, so these headings read like the
          // plain ones (modem 242) while staying clickable.
          if (p.querySelector('a')) {
            p.classList.add('seg-keep');
            p.innerHTML = '<span class="seg-links">' + p.innerHTML + '</span>' + tagsHtml;
            return;
          }
          const raw = p.textContent || '';
          if (!/\//.test(raw) && !chips) return;
          // Plain "name /////" heading → drop the redundant name (the chips identify
          // the entry) and let the slashes stretch (flex + overflow clip) so the
          // chips sit at the right edge at any screen size — pure CSS, responsive.
          p.classList.add('seg-row');
          if (chips) {
            p.innerHTML = slashes + tagsHtml;
          } else {
            const nm = raw.replace(/[\s/]*\/[\s/]*$/, '').trim(); // no tags → keep the name as a fallback
            p.innerHTML = '<span class="seg-name">' + esc(nm) + '</span>' + slashes;
          }
        });
      }

      function renderDetail(rec, records) {
        detailInner.innerHTML =
          (rec.cover ? '<img class="detail-cover-big" src="' + esc(rec.cover) + '" alt="">' : '') +
          (rec.date ? '<div class="detail-date">' + esc(rec.date) + '</div>' : '') +
          '<div class="detail-title">' + esc(rec.title || rec.slug) + '</div>' +
          playerMarkup(rec.soundcloud) +
          (rec.bodyHtml ? '<div class="modem-body">' + rec.bodyHtml + '</div>' : '');
        const body = detailInner.querySelector('.modem-body');
        let listTags = null;
        if (body) { normalizeEmbeds(body); if (rec.type === 'list') listTags = injectListTags(body); else { stripRedundantScCaptions(body); separateVideoSection(body); injectSegTags(body, rec); } }
        initPlayer();

        const nb = neighbors(rec, records);
        setNav(prevBtn, nb.prev);
        setNav(nextBtn, nb.next);

        // For lists, the bottom section is built from the per-entry descriptions
        // (works even when the page has no artist/label taxonomy tags — e.g. 2024);
        // shows use their taxonomy tags.
        const useList = listTags && (listTags.artists.length || listTags.labels.length);
        const artists = useList ? listTags.artists.map((n) => ({ name: n })) : (rec.artists || []);
        const labels = useList ? listTags.labels.map((n) => ({ name: n })) : (rec.labels || []);
        tagsEl.hidden = true; // the old bottom-right floating bubble is gone
        if (artists.length || labels.length) {
          // All the show's artist/label chips live at the very END of the page now,
          // in clearly-labelled artists: / labels: groups. Every chip is a search
          // entry: click it to find every show featuring that artist/label.
          const chips = (arr, cls, kind) => arr.map((x) =>
            '<span class="chip ' + cls + ' clickable" data-kind="' + kind + '" data-name="' + esc(x.name) + '">' + esc(x.name) + '</span>'
          ).join('');
          const sec = document.createElement('div');
          sec.className = 'detail-alltags';
          sec.innerHTML =
            (artists.length ? '<div class="tag-group"><span class="tag-label">artists:</span>' + chips(artists, 'artist-chip', 'artist') + '</div>' : '') +
            (labels.length ? '<div class="tag-group"><span class="tag-label">labels:</span>' + chips(labels, 'label-chip', 'label') + '</div>' : '');
          detailInner.appendChild(sec);
        }

        detailView.hidden = false;
        searchView.hidden = true;
        detailView.scrollTop = 0;
        document.title = 'modem: ' + (rec.title || rec.slug);
      }

      function openTagChip(chip) {
        const kind = chip.getAttribute('data-kind') === 'label' ? 'label' : 'artist';
        const name = chip.getAttribute('data-name') || chip.textContent;
        // Open the floating search overlay filtered to this tag (layers over the
        // current page); fall back to the in-page search route if it's absent.
        if (window.modemSearch) window.modemSearch.open({ tag: { kind: kind, name: name } }, tagsEl);
        else { history.pushState({}, '', '/archive'); location.hash = 'tag=' + kind + ':' + encodeURIComponent(name); }
      }
      // every chip inside the detail (inline per-track + the bottom artists/labels
      // section) opens the same tag search
      detailInner.onclick = (e) => { const chip = e.target.closest('.chip.clickable'); if (chip) openTagChip(chip); };

      backBtn.onclick = () => {
        // These detail pages are always reached from the radio-show grid, so
        // "back" returns there — deterministically, in a single click. Plain
        // history.back() was unreliable here: browsing shows via the ‹ › arrows
        // piles up #hash history entries, and backing across the hash boundary
        // raced the archive's own hashchange handler (which re-rendered the
        // search view), so it frequently took two clicks.
        if (window.loadPageGlobal) {
          window.history.pushState({}, '', '/radio-show');
          window.loadPageGlobal('radio-show');
        } else {
          window.location.href = '/radio-show';
        }
      };

      // -------- search mode (track/album-first) --------
      // Primary index is `data.tracks` — every track/album played across all
      // shows, deduped, each carrying a "featured in modem NN" list. `initial`
      // seeds the view: { query } free text, { tag:{kind,name} } from a chip,
      // or { mode:'shows'|'lists' }.
      const normKey = (s) => (s == null ? '' : String(s)).toLowerCase()
        .normalize('NFKD').replace(/[̀-ͯ]/g, '').replace(/\s+/g, ' ').trim();

      function renderSearch(data, initial) {
        initial = initial || {};
        const records = data.records || [];
        const tracks = data.tracks || [];
        const resultsEl = document.getElementById('archive-results');
        const searchEl = document.getElementById('archive-search');
        const countEl = document.getElementById('archive-count');
        const activeTagEl = document.getElementById('archive-active-tag');

        const bySlug = {};
        records.forEach((r) => (bySlug[r.slug] = r));

        const state = { query: initial.query || '', mode: initial.mode || 'tracks', tag: initial.tag || null };
        searchEl.value = state.query;

        function renderActiveTag() {
          if (state.tag) {
            activeTagEl.hidden = false;
            activeTagEl.innerHTML =
              '<span class="active-tag-pill">' +
                '<span class="active-tag-kind">' + (state.tag.kind === 'label' ? 'label' : 'artist') + '</span>' +
                esc(state.tag.name) +
                '<button type="button" class="active-tag-clear" aria-label="clear filter">×</button>' +
              '</span>';
          } else {
            activeTagEl.hidden = true;
            activeTagEl.innerHTML = '';
          }
        }

        const terms = () => { const q = state.query.trim().toLowerCase(); return q ? q.split(/\s+/) : []; };
        const hit = (hay, ts) => ts.every((t) => hay.indexOf(t) !== -1);
        function emptyMsg() {
          return '<div class="archive-empty">nothing matches ' +
            (state.tag ? state.tag.kind + ' “' + esc(state.tag.name) + '”' : '“' + esc(state.query) + '”') + '</div>';
        }

        function trackMatchesTag(tk, tag) {
          if (tag.kind === 'artist') {
            if (normKey(tk.artist) === normKey(tag.name)) return true;
            // Segment-heading fallback ONLY for tracks with no artist of their own.
            // Otherwise a foreign track mis-grouped under an artist's heading (e.g. an
            // unheaded clip trailing OAKMILK's section) would falsely match that artist.
            if (!tk.artist) return (tk.shows || []).some((s) => normKey(s.segLabel) === normKey(tag.name));
            return false;
          }
          // label: the track's own segment carried this label tag — not merely some
          // other track in the same show (which is what the old show-level match did).
          return (tk.shows || []).some((s) => (s.labels || []).some((n) => normKey(n) === normKey(tag.name)));
        }

        function trackRow(tk) {
          const cover = tk.artUrl || ''; // real track art only; blank square if missing
          const badges = (tk.shows || []).map((s) =>
            '<a class="track-show" href="/' + esc(s.slug) + '">' +
            esc(s.type === 'list' ? String(s.slug).replace(/-0$/, '').replace(/-/g, ' ') : 'modem ' + s.number) + '</a>'
          ).join('');
          const playable = (tk.kind === 'soundcloud' || !!tk.scPlay) && (tk.shows || []).some((s) => s.type === 'show');
          const thumb = '<span class="track-thumb-wrap' + (playable ? ' play' : '') + '">' +
            (cover ? '<img class="track-thumb" loading="lazy" src="' + esc(cover) + '" alt="">' : '<span class="track-thumb"></span>') +
            '</span>';
          return '<div class="track-row" data-key="' + esc(tk.key) + '">' +
            thumb +
            '<div class="track-main">' +
              '<div class="track-title">' + esc(tk.title || '(untitled)') + '</div>' +
              (tk.artist ? '<div class="track-artist">' + esc(tk.artist) + '</div>' : '') +
            '</div>' +
            '<div class="track-shows">' + badges + '</div>' +
          '</div>';
        }

        function showCard(r) {
          return '<a class="archive-card" href="/' + esc(r.slug) + '">' +
            (r.cover ? '<img class="thumb" loading="lazy" src="' + esc(r.cover) + '" alt="">' : '<div class="thumb"></div>') +
            '<div class="card-body"><div class="card-title">' + esc(r.title || r.slug) + '</div>' +
            '<div class="card-meta">' + esc(r.date || '') +
            (r.embeds && r.embeds.length ? ' · ' + r.embeds.length + ' tracks' : '') + '</div></div></a>';
        }

        function drawTracks() {
          const ts = terms();
          const filtered = tracks.filter((tk) => {
            if (state.tag && !trackMatchesTag(tk, state.tag)) return false;
            if (!ts.length) return true;
            return hit((tk.searchText || '').toLowerCase(), ts);
          });
          countEl.textContent = filtered.length + ' / ' + tracks.length + ' tracks';
          resultsEl.className = 'archive-tracklist';
          resultsEl.innerHTML = filtered.length ? filtered.map(trackRow).join('') : emptyMsg();
        }

        function drawShows() {
          const type = state.mode === 'lists' ? 'list' : 'show';
          const ts = terms();
          const pool = records.filter((r) => r.type === type);
          const filtered = pool.filter((r) => {
            if (state.tag) {
              const list = (state.tag.kind === 'label' ? r.labels : r.artists) || [];
              if (!list.some((x) => normKey(x.name) === normKey(state.tag.name))) return false;
            }
            if (!ts.length) return true;
            return hit((r.searchText || '').toLowerCase(), ts);
          });
          countEl.textContent = filtered.length + ' / ' + pool.length + ' ' + (type === 'list' ? 'lists' : 'shows');
          resultsEl.className = 'archive-grid';
          resultsEl.innerHTML = filtered.length ? filtered.map(showCard).join('') : emptyMsg();
        }

        function draw() { state.mode === 'tracks' ? drawTracks() : drawShows(); }

        searchEl.oninput = () => { state.query = searchEl.value; draw(); };
        activeTagEl.onclick = (e) => {
          if (!e.target.closest('.active-tag-clear')) return;
          state.tag = null;
          if (history.replaceState) history.replaceState(null, '', location.pathname + location.search);
          renderActiveTag();
          draw();
        };
        // click a track row → play SoundCloud tracks in the mini-player (if present),
        // otherwise open the source; badges/source links keep their native behaviour.
        resultsEl.onclick = (e) => {
          if (e.target.closest('a')) return;
          const row = e.target.closest('.track-row');
          if (!row) return;
          const tk = tracks.find((x) => x.key === row.getAttribute('data-key'));
          if (!tk) return;
          if ((tk.kind === 'soundcloud' || tk.scPlay) && (tk.shows || []).some((s) => s.type === 'show') && window.modemPlayer) window.modemPlayer.playTrack(tk, tracks);
          else if (tk.link) window.open(tk.link, '_blank', 'noopener');
        };
        searchView.querySelectorAll('.archive-filters button').forEach((btn) => {
          btn.onclick = () => {
            state.mode = btn.getAttribute('data-mode');
            searchView.querySelectorAll('.archive-filters button').forEach((b) => b.classList.remove('active'));
            btn.classList.add('active');
            draw();
          };
        });
        searchView.querySelectorAll('.archive-filters button').forEach((b) =>
          b.classList.toggle('active', b.getAttribute('data-mode') === state.mode));

        searchView.hidden = false;
        detailView.hidden = true;
        tagsEl.hidden = true;
        renderActiveTag();
        draw();
      }

      function route(data) {
        const records = data.records || [];
        const bySlug = {};
        records.forEach((r) => (bySlug[r.slug] = r));
        const raw = (location.hash || '').replace(/^#/, '');
        if (raw.indexOf('tag=') === 0) {
          const rest = raw.slice(4);
          const ci = rest.indexOf(':');
          const kind = ci > -1 && rest.slice(0, ci) === 'label' ? 'label' : 'artist';
          const name = decodeURIComponent(ci > -1 ? rest.slice(ci + 1) : rest);
          return renderSearch(data, { tag: { kind, name } });
        }
        if (raw.indexOf('q=') === 0) return renderSearch(data, { query: decodeURIComponent(raw.slice(2)) });
        const slug = slugFromPath() || slugFromHash();
        if (slug && bySlug[slug]) renderDetail(bySlug[slug], records);
        else renderSearch(data, {});
      }

      function withData(cb) {
        if (window.__modemData) return cb(window.__modemData);
        fetch('assets/modem-archive.json', { cache: 'no-cache' })
          .then((r) => r.json())
          .then((data) => {
            window.__modemData = { records: data.records || [], tracks: data.tracks || [] };
            window.__modemArchive = window.__modemData.records; // back-compat
            cb(window.__modemData);
          })
          .catch((err) => {
            detailInner.innerHTML = '<div class="archive-empty">could not load the archive data</div>';
            detailView.hidden = false;
            console.error('archive load failed', err);
          });
      }

      withData(route);
      // Let the shell re-route this already-mounted fragment from the current path
      // (detail↔detail nav, popstate) without re-fetching/re-injecting it.
      window.routeArchive = function () { withData(route); };

      if (!window.__archiveHashBound) {
        window.__archiveHashBound = true;
        window.addEventListener('hashchange', () => {
          // Only re-route while we're still on the /archive path. A browser/gesture
          // back OUT of the archive also clears the #hash and fires this event —
          // without the guard it would re-render the archive search view and fight
          // the SPA's popstate handler, making back take a second click.
          if (location.pathname.replace(/\/+$/, '') !== '/archive') return;
          if (document.getElementById('archive-detail-view')) withData(route);
        });
      }
    };

    window.initArchive();</script></body></html>
