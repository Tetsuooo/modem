<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>modem: shop</title>
  <script>
    if (window.location.pathname !== '/' && 
        !window.location.search.includes('embedded') &&
        !document.querySelector('nav') && 
        window === window.top) {
      window.location.replace('/?redirect=' + encodeURIComponent(window.location.pathname.replace(/^\/|\.html$/g, '')));
    }
  </script>
  <style>
    .content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      background: transparent;
      width: 100%;
      padding: 2rem;
    }

    .shop-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      flex-wrap: wrap;
    }

    .shop-container a {
      text-decoration: none;
      color: black;
    }

    .shop-image {
      width: 700px; 
      max-width: 90vw; 
      height: auto;
    }

    .shop-text {
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      max-width: 400px;
      text-align: left;
    }

    @media (max-width: 768px) {
      .content {
        padding: 0.75rem;
      }

      .shop-container {
        flex-direction: column;
        text-align: center;
      }

      .shop-text {
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      .content {
        padding: 0.375rem;
      }
    }
  </style>
</head>
<body>
  <div class="content">

    <div class="shop-container">
      <a href="https://modemodemodem.bandcamp.com/merch/modem-t-shirt" target="_blank">
        <img src="./assets/shop/tshirt.webp" alt="Modem T-Shirt" class="shop-image">
      </a>

      <a href="https://modemodemodem.bandcamp.com/merch/modem-t-shirt" target="_blank" class="shop-text">
        Modem T-Shirt, DTF print on 0.23kg cotton, boxy / oversized fit, 30 EUR
      </a>
    </div>

  </div>
</body>
</html>
