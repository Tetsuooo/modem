<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>modem: radio show</title>
  <script>
    // Only redirect if we're not already in the SPA context
    // Check if we're the top-level window and don't have the SPA navigation
    if (window.location.pathname !== '/' && 
        !window.location.search.includes('embedded') &&
        !document.querySelector('nav') && 
        window === window.top) {
      window.location.replace('/?redirect=' + encodeURIComponent(window.location.pathname.replace(/^\/|\.html$/g, '')));
    }
  </script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent; /* Transparent to show the animation */
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto; /* Scroll vertically when the grid is taller than the window */
    }
    .content {
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      /* Top padding clears the fixed nav so the top row stays visible when scrolled up */
      padding: 3rem 0 1.5rem;
    }
    .number-grid {
      /* --rows is set by JS to the actual number of rows in the grid.
         --min-cell is the smallest a cell may get: 0 on desktop (pure fit-to-screen),
         larger on touch (below) so numbers stay big even if that means scrolling. */
      --rows: 25;
      --min-cell: 0px;
      /* Tallest cell that still lets every row fit the viewport height (below the fixed nav).
         The 1.3 leaves tasteful breathing room above/below (grid fills ~80% of the height). */
      --fit-h: calc((100vh - 5.5rem) / (var(--rows) * 1.3));
      /* Widest cell that still keeps all 10 columns within the viewport (never scroll sideways). */
      --fit-w: calc((100vw - 1.5rem) / 14);
      /* Fit both axes; on touch never shrink below the readable minimum. */
      --cell: min(var(--fit-w), max(var(--min-cell), var(--fit-h)));

      display: grid;
      grid-template-columns: repeat(10, 1fr); /* Always 10 columns */
      gap: calc(var(--cell) * 0.12) calc(var(--cell) * 0.3); /* row gap / column gap, scale with cell */
      width: fit-content; /* Narrow grid sized to its content, centered by .content (not stretched across the screen) */
      max-width: 100%;
      text-align: center;
      direction: rtl;
      margin: 0 auto;
    }
    .number-grid div {
      font-size: calc(var(--cell) * 0.46);
      min-height: var(--cell);
      font-weight: bold;
      color: black;
      padding: 0 calc(var(--cell) * 0.08);
      border-radius: 0;
      transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .number-grid a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 0; /* Remove padding from links */
      margin: 0; /* Remove margin from links */
    }
    .number-grid div:hover {
      background: rgba(255, 255, 0, 0.8); /* More saturated and brighter yellow */
      transform: scale(1.2);
      box-shadow: 0 0 0 2px #ffff00; /* Sharp yellow border */
    }
    /* Shows mirrored into the on-site archive stay clickable but carry no
       persistent tint — with the whole run indexed, the yellow marker on every
       cell just added noise. Hover still highlights the cell. */
    .preview-image {
      position: fixed;
      width: clamp(150px, 25vw, 300px); /* Scale with viewport width */
      height: clamp(150px, 25vw, 300px); /* Scale with viewport width */
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 100;
    }

    /* Keep the hover cover-preview a touch larger on small screens */
    @media (max-width: 480px) {
      .preview-image {
        width: clamp(120px, 35vw, 250px);
        height: clamp(120px, 35vw, 250px);
      }
    }

    /* Touch devices (phones/tablets): keep numbers big and readable; scroll only if they can't all fit. */
    @media (hover: none), (pointer: coarse) {
      body { overflow-y: auto; }
      .number-grid { --min-cell: 2.5rem; }
      .content { padding-top: 4.5rem; } /* clear the (larger) touch nav when scrolled to the top */
    }

    /* Pointer devices (desktop): never scroll — the grid always scales to fit the screen neatly. */
    @media (hover: hover) and (pointer: fine) {
      body { overflow: hidden; }
    }

    /* floating white action buttons — bigger, playfully staggered to the left of the grid */
    .modem-actions {
      position: fixed; left: clamp(0.75rem, 4vw, 4rem); top: 50%; transform: translateY(-50%); z-index: 199998;
      display: flex; flex-direction: column; align-items: flex-start; gap: 1.1rem;
    }
    .modem-action {
      font-family: Arial, sans-serif; font-weight: bold; text-transform: lowercase;
      font-size: clamp(0.78rem, 2.3vw, 1rem); /* scales with the screen */
      text-decoration: none; user-select: none; cursor: pointer;
      background: #fff; color: #000; border: 2px solid #000; border-radius: 999px;
      padding: clamp(0.4rem, 1.3vw, 0.55rem) clamp(0.8rem, 2.6vw, 1.15rem); display: inline-flex; align-items: center; gap: 0.4rem;
      box-shadow: 0 3px 0 #000; transition: transform 0.12s ease, background 0.12s ease;
    }
    .modem-actions .modem-action:nth-child(1) { transform: rotate(-3deg); }
    .modem-actions .modem-action:nth-child(2) { margin-left: 2.4rem; transform: rotate(2.5deg); }
    .modem-actions .modem-action:nth-child(3) { margin-left: 0.9rem; transform: rotate(-1.5deg); }
    .modem-action:hover { background: #ffff00; transform: rotate(0deg) scale(1.06); }
    .modem-action .mag { font-size: 1.05rem; line-height: 1; }

    /* tablets: keep the staggered left column but scale it down + reduce the offset
       so it stays inside the grid's side margin and never overlaps the numbers */
    @media (min-width: 721px) and (max-width: 1200px) {
      .modem-actions { left: 0.4rem; gap: 0.7rem; }
      .modem-action { font-size: 0.74rem; padding: 0.32rem 0.72rem; box-shadow: 0 2px 0 #000; }
      .modem-actions .modem-action:nth-child(2) { margin-left: 1rem; }
      .modem-actions .modem-action:nth-child(3) { margin-left: 0.5rem; }
    }

    /* on phones: keep them FLOATING (no bar), just smaller and tucked bottom-left */
    @media (max-width: 720px) {
      .modem-actions { top: auto; bottom: 0.7rem; left: 0.7rem; right: auto; transform: none; align-items: flex-start; gap: 0.4rem; }
      .modem-actions .modem-action { margin-left: 0 !important; transform: none !important; font-size: 0.72rem; padding: 0.3rem 0.7rem; box-shadow: 0 2px 0 #000; }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="number-grid"></div>
    <div class="modem-actions">
      <button type="button" class="modem-action" data-act="shows">play random show</button>
      <button type="button" class="modem-action" data-act="tracks">play random track</button>
      <button type="button" class="modem-action" data-act="search"><span class="mag">⌕</span> search</button>
    </div>
  </div>

  <script>
    // Clean up any interference from other pages
    function cleanupInterference() {
      // Reset any overridden functions that might interfere
      if (window.originalAppendChild) {
        Node.prototype.appendChild = window.originalAppendChild;
      }
      if (window.originalEval) {
        window.eval = window.originalEval;
      }
      if (window.originalFunction) {
        window.Function = window.originalFunction;
      }
    }

    function initializeRadioShow() {
      const grid = document.querySelector('.number-grid');
      if (!grid) {
        console.warn('Grid element not found');
        // If grid isn't found, retry after a short delay
        setTimeout(initializeRadioShow, 100);
        return;
      }

      // Clear any existing content and preview
      grid.innerHTML = '';
      const existingPreview = document.querySelector('.preview-image');
      if (existingPreview) {
        existingPreview.remove();
      }

      const getCurrentNumber = () => {
        const startDate = new Date('2025-05-12');
        const today = new Date();
        const diffInDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
        const additionalNumbers = Math.floor(diffInDays / 14);
        return 212 + additionalNumbers;
      };

      const totalNumbers = getCurrentNumber();
      const numbersPerRow = 10;
      const rows = Math.ceil(totalNumbers / numbersPerRow);

      // Publish the row count so the CSS can size cells to fit the viewport height
      grid.style.setProperty('--rows', rows);

      // Create preview image element
      const preview = document.createElement('img');
      preview.className = 'preview-image';
      document.body.appendChild(preview);

      // Fill grid row by row, starting from the bottom
      for (let row = rows - 1; row >= 0; row--) {
        for (let col = 0; col < numbersPerRow; col++) {
          const div = document.createElement('div');
          const number = row * numbersPerRow + col + 1;
          if (number <= totalNumbers) {
            const link = document.createElement('a');
            // The earliest / anniversary shows have irregular radiostudent slugs.
            // Set data-modem to the real slug so markLocalArchiveShows() redirects
            // them to the on-site archive like every other show; the external href
            // stays only as a fallback for shows not yet mirrored locally.
            if (number === 1) {
              link.href = 'https://radiostudent.si/glasba/modem/modem-01-0';
              link.dataset.modem = 'modem-01-0';
            } else if (number === 100) {
              link.href = 'https://radiostudent.si/glasba/modem/modem-100-bag-of-toys';
              link.dataset.modem = 'modem-100-bag-of-toys';
            } else if (number === 200) {
              link.href = 'https://radiostudent.si/glasba/modem/modem-200-bag-of-toys-2';
              link.dataset.modem = 'modem-200-bag-of-toys-2';
            } else {
              const paddedNumber = number < 10 ? `0${number}` : number;
              link.href = `https://radiostudent.si/glasba/modem/modem-${paddedNumber}`;
              link.dataset.modem = `modem-${paddedNumber}`;
            }
            link.textContent = number;
            link.style.textDecoration = 'none';
            link.style.color = 'black';

            const handleMouseEnter = () => {
              preview.src = `./assets/modem_covers/modem${number < 10 ? `0${number}` : number}.webp`;
              preview.style.opacity = '1';
              const maxX = window.innerWidth - 256;
              const maxY = window.innerHeight - 256;
              preview.style.left = Math.random() * maxX + 'px';
              preview.style.top = Math.random() * maxY + 'px';
            };

            const handleMouseLeave = () => {
              preview.style.opacity = '0';
            };

            const handlePreviewError = () => {
              preview.style.opacity = '0';
            };

            link.addEventListener('mouseenter', handleMouseEnter);
            link.addEventListener('mouseleave', handleMouseLeave);
            preview.addEventListener('error', handlePreviewError);

            div.appendChild(link);
          }
          grid.appendChild(div);
        }
      }

      // Redirect shows that already live in the local archive to their local entry
      markLocalArchiveShows();
    }

    // For shows we've mirrored locally, point the grid link at the on-site archive
    // entry (/archive#modem-NN) and visually mark it as available.
    function markLocalArchiveShows() {
      fetch('assets/modem-archive.json', { cache: 'no-cache' })
        .then((r) => r.json())
        .then((data) => {
          const local = new Set(
            (data.records || []).filter((r) => r.type === 'show').map((r) => r.slug)
          );
          document.querySelectorAll('.number-grid a[data-modem]').forEach((a) => {
            if (local.has(a.dataset.modem)) {
              a.href = '/archive#' + a.dataset.modem;
              a.classList.add('in-archive');
              a.title = 'open in the on-site archive';
            }
          });
        })
        .catch(() => {});
    }

    // Clean up interference first
    cleanupInterference();

    // Make initialization function available globally
    window.initializeRadioShow = initializeRadioShow;

    // Force initialization multiple times to ensure it works
    initializeRadioShow();
    
    // Also try after a small delay
    setTimeout(initializeRadioShow, 50);
    setTimeout(initializeRadioShow, 200);

    // Also initialize when the DOM is loaded
    document.addEventListener('DOMContentLoaded', initializeRadioShow);
    
    // Force initialization when window loads
    window.addEventListener('load', initializeRadioShow);

    // Wire the floating action buttons to the persistent shuffle player
    // (window.modemPlayer lives in the SPA shell; the "search" link routes itself).
    (function () {
      const acts = document.querySelector('.modem-actions');
      if (!acts || acts.dataset.wired) return;
      acts.dataset.wired = '1';
      acts.addEventListener('click', (e) => {
        const b = e.target.closest('.modem-action[data-act]');
        if (!b) return;
        const act = b.getAttribute('data-act');
        if (act === 'search') { if (window.modemSearch) window.modemSearch.open(undefined, b); else window.location.href = '/archive'; return; }
        if (!window.modemPlayer) return;
        if (act === 'shows') window.modemPlayer.playShows(b);
        else if (act === 'tracks') window.modemPlayer.playTracks(b);
      });
    })();
  </script>
</body>
</html>
